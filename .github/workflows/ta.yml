name: ta

on:
  workflow_dispatch:
  schedule:
     - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: ta
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Compute TA
        env:
          GH_READ_PAT: ${{ secrets.GH_READ_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/compute_ta.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ta_snapshots.json data/ta_history.json
          if git diff --cached --quiet; then
            echo "No changes; skipping commit."
            exit 0
          fi
          git commit -m "data: ta refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
